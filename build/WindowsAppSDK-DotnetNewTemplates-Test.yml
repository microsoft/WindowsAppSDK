#
# Standalone pipeline for smoke-testing dotnet new WinUI templates.
# Instantiates each C# template, builds the generated project, and validates
# item templates can be added to a host project.
#
# This pipeline does NOT require OneBranch and runs on standard Azure-hosted agents.

trigger: none

pr:
  branches:
    include:
    - main
    - release/*
  paths:
    include:
    - dev/Templates/Dotnet/**
    - dev/Templates/Source/**
    - build/WindowsAppSDK-DotnetNewTemplates-Test.yml
    - build/AzurePipelinesTemplates/WindowsAppSDK-DotnetNewTemplates-Test-Stage.yml

parameters:
- name: "Platforms"
  displayName: "Platforms to validate (space-separated)"
  type: object
  default:
  - x64

pool:
  vmImage: 'windows-latest'

stages:
- template: AzurePipelinesTemplates/WindowsAppSDK-DotnetNewTemplates-Test-Stage.yml
  parameters:
    pool:
      vmImage: 'windows-latest'
    sourceSubdirectory: ''
    platforms: ${{ parameters.Platforms }}
