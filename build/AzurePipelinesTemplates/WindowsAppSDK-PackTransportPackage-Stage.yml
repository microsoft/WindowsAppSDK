parameters:
- name: "PublishPackage"
  type: boolean
  default: true
- name: "SignOutput"
  type: boolean
  default: true
- name: "IsOfficial"
  type: boolean
  default: false
- name: "BuildMockWindowsAppSDK"
  type: boolean
  default: true

stages:
- stage: Pack
  dependsOn: 
    - Build_AnyCPU
    - Build_x86
    - Build_x64
    - Build_arm64
  condition:
    and(succeeded(), eq(variables['foundationUseBuildOutputFromBuildId'],''))
  jobs:
  - job: NugetPackage
    pool:
      type: windows
    timeoutInMinutes: 120
    variables:
      ob_outputDirectory: '$(REPOROOT)\out'
      ob_artifactBaseName: "TransportPackage"
      ob_sdl_prefast_enabled: false
      # Default to empty so $(WindowsAppSDKVersionPinned) resolves to empty string
      # rather than being treated as a PowerShell command invocation.
      # In the monobuild, DetermineVersion-Steps sets this via env var when a local feed exists.
      WindowsAppSDKVersionPinned: ''
    steps:
    - template: WindowsAppSDK-PackTransportPackage-Steps.yml
      parameters:
        SignOutput: ${{ parameters.SignOutput }}
        IsOfficial: ${{ parameters.IsOfficial }}
        PublishPackage: ${{ parameters.PublishPackage }}
        foundationArtifactPrefix: 'FoundationBinaries_release'
        mrtArtifactPrefix: 'MrtBinaries_release'