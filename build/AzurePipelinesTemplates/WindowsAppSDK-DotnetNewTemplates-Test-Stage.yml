#
# Stage template: Smoke-test dotnet new templates by scaffolding and building
# each C# project template and all item templates.
#
# This stage runs after DotnetNewTemplates_Build in the main build pipeline
# (WindowsAppSDK-DotnetNewTemplates.yml). It downloads the .nupkg artifact
# produced by the build stage and passes it to Test-DotnetNewTemplates.ps1.

parameters:
- name: pool
  type: object
  default:
    vmImage: 'windows-latest'
- name: sourceSubdirectory
  type: string
  default: 'WindowsAppSDK'
- name: dependsOnStage
  type: string
  default: 'DotnetNewTemplates_Build'
- name: platforms
  type: object
  default:
  - x64
- name: dotnetSdkVersion
  type: string
  default: '8.0.x'

stages:
- stage: DotnetNewTemplates_Test
  displayName: 'Smoke-test dotnet new templates'
  dependsOn:
  - ${{ parameters.dependsOnStage }}
  jobs:
  - job: TestDotnetNewTemplates
    displayName: 'Scaffold and build dotnet new templates'
    pool: ${{ parameters.pool }}
    timeoutInMinutes: 60
    variables:
      ob_outputDirectory: '$(Build.ArtifactStagingDirectory)\test-results'
      templateArtifactDir: '$(Pipeline.Workspace)\drop_DotnetNewTemplates_Build_PackDotnetNewTemplates'
    steps:
    - checkout: self

    - download: current
      displayName: 'Download template pack artifact'
      artifact: 'drop_DotnetNewTemplates_Build_PackDotnetNewTemplates'

    - task: UseDotNet@2
      displayName: 'Use .NET SDK ${{ parameters.dotnetSdkVersion }}'
      inputs:
        packageType: sdk
        version: '${{ parameters.dotnetSdkVersion }}'

    - task: NuGetAuthenticate@1
      displayName: 'Authenticate NuGet feeds'

    - task: PowerShell@2
      displayName: 'Run template smoke tests'
      inputs:
        targetType: inline
        failOnStderr: false
        workingDirectory: '$(Build.SourcesDirectory)\${{ parameters.sourceSubdirectory }}'
        script: |
          $package = Get-ChildItem -Path '$(templateArtifactDir)' -Filter 'Microsoft.WindowsAppSDK*.nupkg' -Recurse | Select-Object -First 1
          if (-not $package) {
            throw "No template .nupkg found under '$(templateArtifactDir)'"
          }
          Write-Host "Using template package: $($package.FullName)"
          $platforms = '${{ join(',', parameters.platforms) }}' -split ','
          & '$(Build.SourcesDirectory)\${{ parameters.sourceSubdirectory }}\dev\Templates\Dotnet\Test-DotnetNewTemplates.ps1' `
            -PackagePath $package.FullName `
            -Platforms $platforms `
            -SkipAppLaunch
