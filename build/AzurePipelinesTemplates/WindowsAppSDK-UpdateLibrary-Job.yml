# Updates the WinAppSDK-{Major}-Versions Library (Variable Group) after a
# successful Foundation official build. Bumps PatchVersion + Revision counters.
# Adapted from main #6462 for monobuild's variable namespace.
#
# Variable name mapping vs. main (Foundation-specific Library group):
#   FoundationMinorVersionResolved        -> MinorVersion       (statically defined)
#   FoundationPatchVersionResolved        -> WindowsAppRuntimePatchVersion
#   FoundationPreviewRevisionResolved     -> PreviewRevision
#   FoundationExperimentalRevisionResolved-> ExperimentalRevision
#   FoundationLibraryName                 -> LibraryName  (= WinAppSDK-{Major}-Versions)
# Library-group variable name mapping (Foundation-prefixed -> Aggregate-prefixed):
#   FoundationPatchVersion          -> AggregatePatchVersion
#   FoundationPreviewRevision       -> AggregatePreviewRevision
#   FoundationExperimentalRevision  -> AggregateExperimentalRevision
#
# NOTE: This job updates the SHARED WinAppSDK-{Major}-Versions group, which is
# also consumed by the Aggregator. If the Aggregator's own UpdateLibrary job
# bumps the same counters, this will double-bump. Gate appropriately or move
# to a Foundation-specific group if needed.

parameters:
- name: jobName
  displayName: "Job Name"
  type: string
  default: 'UpdateFoundationLibraryJob'
- name: BuildType
  displayName: "Build Type"
  type: string
  default: 'stable'
- name: PrOrNightly
  displayName: "PR or Nightly"
  type: string
  default: ''

jobs:
- job: ${{ parameters.jobName }}
  variables:
    ob_outputDirectory: '$(REPOROOT)\out'
    ob_artifactBaseName: '${{parameters.jobName}}'
  pool:
    type: windows
  displayName: "Update Foundation Variable Group"
  steps:
  - script: |
      echo MajorVersion                       : $(MajorVersion)
      echo MinorVersion                       : $(MinorVersion)
      echo Revision                           : $(Revision)
      echo WindowsAppRuntimePatchVersion      : $(WindowsAppRuntimePatchVersion)
      echo PreviewRevision                    : $(PreviewRevision)
      echo ExperimentalRevision               : $(ExperimentalRevision)
      echo LibraryName                        : $(LibraryName)
      echo NugetBuildTypePrefix               : $(NugetBuildTypePrefix)
    displayName: 'Variables'

  # Create the next Variable Group if it does not already exist so that when we change the Major version,
  # the next build will already have the variable group available.
  - task: PowerShell@2
    displayName: Create Next Variable Group if Necessary
    env:
      AZURE_DEVOPS_EXT_PAT: $(System.AccessToken)
    inputs:
      targetType: 'inline'
      script: |
        $NextMajorVersion = [int]$(MajorVersion) + 1
        $NextLibraryName = "WinAppSDK-$NextMajorVersion-Versions"

        echo "Next Major Version will be $NextMajorVersion, so next Variable Group will be $NextLibraryName"
        echo "Checking to see if the next Variable Group exists"
        $groupExists = az pipelines variable-group list --query "[?name=='$NextLibraryName']" | ConvertFrom-Json
        if ($groupExists.Count -eq 0)
        {
          echo "Creating Variable Group $NextLibraryName"
          az pipelines variable-group create --name "$NextLibraryName" --description "Variable group for Windows App SDK Major Version $NextMajorVersion" --authorize --variables AggregatePatchVersion=0 AggregatePreviewRevision=0 AggregateExperimentalRevision=0
        }
        else
        {
          echo "Variable Group $NextLibraryName already exists"
        }

  - task: PowerShell@2
    condition: eq('${{ parameters.PrOrNightly }}', '')
    displayName: Update AggregatePreviewRevision in Variable Group
    env:
      AZURE_DEVOPS_EXT_PAT: $(System.AccessToken)
    inputs:
      targetType: 'inline'
      script: |
        echo "Determining if we need to update AggregatePreviewRevision variable in Variable Group"
        $NextPreviewRevision = [int]$(PreviewRevision)
        if ("${{ parameters.BuildType }}" -eq 'preview')
        {
          $NextPreviewRevision = $NextPreviewRevision + 1
        }

        if ($NextPreviewRevision -ne '$(AggregatePreviewRevision)')
        {
          echo "Updating AggregatePreviewRevision variable in Variable Group to $NextPreviewRevision"
          $group_id = $(az pipelines variable-group list -p $(System.TeamProject) --group-name $(LibraryName) --query '[0].id' -o json)
          az pipelines variable-group variable update --group-id $group_id --name AggregatePreviewRevision --value $NextPreviewRevision
        }
        else
        {
          echo "No update needed for AggregatePreviewRevision variable in Variable Group"
        }

  - task: PowerShell@2
    condition: eq('${{ parameters.PrOrNightly }}', '')
    displayName: Update AggregateExperimentalRevision in Variable Group
    env:
      AZURE_DEVOPS_EXT_PAT: $(System.AccessToken)
    inputs:
      targetType: 'inline'
      script: |
        echo "Determining if we need to update AggregateExperimentalRevision variable in Variable Group"
        $NextExperimentalRevision = [int]$(ExperimentalRevision)
        if ("${{ parameters.BuildType }}" -eq "experimental")
        {
          $NextExperimentalRevision = $NextExperimentalRevision + 1
        }

        if ($NextExperimentalRevision -ne '$(AggregateExperimentalRevision)')
        {
          echo "Updating AggregateExperimentalRevision variable in Variable Group to $NextExperimentalRevision"
          $group_id = $(az pipelines variable-group list -p $(System.TeamProject) --group-name $(LibraryName) --query '[0].id' -o json)
          az pipelines variable-group variable update --group-id $group_id --name AggregateExperimentalRevision --value $NextExperimentalRevision
        }
        else
        {
          echo "No update needed for AggregateExperimentalRevision variable in Variable Group"
        }

  - task: PowerShell@2
    condition: eq('${{ parameters.PrOrNightly }}', '')
    displayName: Update AggregatePatchVersion in Variable Group
    env:
      AZURE_DEVOPS_EXT_PAT: $(System.AccessToken)
    inputs:
      targetType: 'inline'
      script: |
        echo "Determining if we need to update AggregatePatchVersion variable in Variable Group"
        $NextPatchVersion = "$(WindowsAppRuntimePatchVersion)"

        # Bump patch on stable official builds (when NugetBuildTypePrefix is empty, meaning not PR/Nightly)
        if (("${{ parameters.BuildType }}" -eq "stable") -And ('$(NugetBuildTypePrefix)' -eq ''))
        {
          $NextPatchVersion = [int]$NextPatchVersion + 1
        }
        elseif ((($(MinorVersion) -ne 0) -Or ($(WindowsAppRuntimePatchVersion) -ne 0)) -And ('$(NugetBuildTypePrefix)' -eq ''))
        {
          $NextPatchVersion = [int]$NextPatchVersion + 1
        }

        if ($NextPatchVersion -ne '$(AggregatePatchVersion)')
        {
          echo "Updating AggregatePatchVersion variable in Variable Group to $NextPatchVersion"
          $group_id = $(az pipelines variable-group list -p $(System.TeamProject) --group-name $(LibraryName) --query '[0].id' -o json)
          az pipelines variable-group variable update --group-id $group_id --name AggregatePatchVersion --value $NextPatchVersion
        }
        else
        {
          echo "No update needed for AggregatePatchVersion variable in Variable Group"
        }
