parameters:
- name: "TestOnArm64"
  type: boolean
  default: true
- name: testMatrix
  type: object
  default: ''

stages:
# ExtractMatrix stages always run (no skip condition) so the test matrix
# is available even when Build stages are skipped via foundationUseBuildOutputFromBuildId.
- stage: ExtractMatrix_x86
  dependsOn: []
  jobs:
  - job: ExtractMatrix
    pool:
      type: windows
      isCustom: true
      name: 'ProjectReunionESPool-2022'
    steps:
    - powershell: |
        $testMatrix = '${{ convertToJson(parameters.testMatrix) }}' | ConvertFrom-Json
        $targetPlatform = "x86"
        $filteredMatrix = @{}
        foreach ($entry in $testMatrix.PSObject.Properties) {
          if ($entry.Value.buildPlatform -eq $targetPlatform) {
              $filteredMatrix[$entry.Name] = $entry.Value
          }
        }
        $matrixJson = $filteredMatrix | ConvertTo-Json -Compress
        Write-Host "##vso[task.setvariable variable=filteredTestMatrix;isOutput=true]$matrixJson"
      name: filterByPlatformStep
      displayName: "Extract matrix filtering by x86"

- stage: ExtractMatrix_x64
  dependsOn: []
  jobs:
  - job: ExtractMatrix
    pool:
      type: windows
      isCustom: true
      name: 'ProjectReunionESPool-2022'
    steps:
    - powershell: |
        $testMatrix = '${{ convertToJson(parameters.testMatrix) }}' | ConvertFrom-Json
        $targetPlatform = "x64"
        $filteredMatrix = @{}
        foreach ($entry in $testMatrix.PSObject.Properties) {
          if ($entry.Value.buildPlatform -eq $targetPlatform) {
              $filteredMatrix[$entry.Name] = $entry.Value
          }
        }
        $matrixJson = $filteredMatrix | ConvertTo-Json -Compress
        Write-Host "##vso[task.setvariable variable=filteredTestMatrix;isOutput=true]$matrixJson"
      name: filterByPlatformStep
      displayName: "Extract matrix filtering by x64"

- ${{ if eq(parameters.TestOnArm64, true)}}:
  - stage: ExtractMatrix_arm64
    dependsOn: []
    jobs:
    - job: ExtractMatrix
      pool:
        type: windows
        isCustom: true
        name: 'ProjectReunionESPool-2022'
      steps:
      - powershell: |
          $testMatrix = '${{ convertToJson(parameters.testMatrix) }}' | ConvertFrom-Json
          $targetPlatform = "arm64"
          $filteredMatrix = @{}
          foreach ($entry in $testMatrix.PSObject.Properties) {
            if ($entry.Value.buildPlatform -eq $targetPlatform) {
                $filteredMatrix[$entry.Name] = $entry.Value
            }
          }
          $matrixJson = $filteredMatrix | ConvertTo-Json -Compress
          Write-Host "##vso[task.setvariable variable=filteredTestMatrix;isOutput=true]$matrixJson"
        name: filterByPlatformStep
        displayName: "Extract matrix filtering by arm64"

- stage: Test_x86
  dependsOn:
  - Build_x86
  - ExtractMatrix_x86
  condition: not(failed())
  jobs:
  - template: WindowsAppSDK-RunTestsInPipeline-Job.yml@self
    parameters:
      jobName: PipelineTests
      testMatrix: $[ stageDependencies.ExtractMatrix_x86.ExtractMatrix.outputs['filterByPlatformStep.filteredTestMatrix'] ]
      buildPlatform: x86

- stage: Test_x64
  dependsOn:
  - Build_x64
  - ExtractMatrix_x64
  condition: not(failed())
  jobs:
  - template: WindowsAppSDK-RunTestsInPipeline-Job.yml@self
    parameters:
      jobName: PipelineTests
      testMatrix: $[ stageDependencies.ExtractMatrix_x64.ExtractMatrix.outputs['filterByPlatformStep.filteredTestMatrix'] ]
      buildPlatform: x64

- ${{ if eq(parameters.TestOnArm64, true)}}:
  - stage: Test_arm64
    dependsOn:
    - Build_arm64
    - ExtractMatrix_arm64
    condition: not(failed())
    jobs:
    - template: WindowsAppSDK-RunTestsInPipeline-Job.yml@self
      parameters:
        jobName: PipelineTests
        testMatrix: $[ stageDependencies.ExtractMatrix_arm64.ExtractMatrix.outputs['filterByPlatformStep.filteredTestMatrix'] ]
        buildPlatform: arm64
