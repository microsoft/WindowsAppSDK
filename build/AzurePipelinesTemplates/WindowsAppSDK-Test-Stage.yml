stages:
- stage: Test_x86
  dependsOn: Build_x86
  condition: not(failed())
  jobs:
  - template: WindowsAppSDK-RunTestsInPipeline-Job.yml@self
    parameters:
      jobName: PipelineTests
      testMatrix: $[ variables.PipelineTestsX86 ] # testMatrix is supplied by WindowsAppSDKConfig/WindowsAppSDK-Foundation-TestConfig.yml

- stage: Test_x64
  dependsOn: Build_x64
  condition: not(failed())
  jobs:
  - template: WindowsAppSDK-RunTestsInPipeline-Job.yml@self
    parameters:
      jobName: PipelineTests
      testMatrix: $[ variables.PipelineTestsX64 ] # testMatrix is supplied by WindowsAppSDKConfig/WindowsAppSDK-Foundation-TestConfig.yml

- stage: Test_arm64
  dependsOn: Build_arm64
  condition: not(failed())
  jobs:
  - template: WindowsAppSDK-RunTestsInPipeline-Job.yml@self
    parameters:
      jobName: PipelineTests
      testMatrix: $[ variables.PipelineTestsArm64 ] # testMatrix is supplied by WindowsAppSDKConfig/WindowsAppSDK-Foundation-TestConfig.yml
