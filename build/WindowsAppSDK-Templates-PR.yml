#####################################################################################################################################
#                                       Templates PR Validation Pipeline                                                            #
#####################################################################################################################################
#
# PR validation for changes under dev/Templates/**.
#
# Reuses the build/pack + smoke-test logic from the main dotnet-new
# templates pipeline (WindowsAppSDK-DotnetNewTemplates.yml) by extending
# the same OneBranch non-official 1ES template and including the same
# two stage templates:
#   * WindowsAppSDK-DotnetNewTemplates-Stages.yml      (Build + Pack)
#   * WindowsAppSDK-DotnetNewTemplates-Test-Stage.yml  (Smoke-test)
#
# PR builds are stamped with a '.pr.<PR#>.<BuildId>' version suffix so
# the produced .nupkg can never collide with the canonical alpha
# packages produced by the main build pipeline. Nothing is signed and
# nothing is published to any feed for PR runs.
#
# Trigger configuration:
#   * CI / PR triggers are configured in the Azure DevOps UI on this
#     pipeline (Edit pipeline -> Triggers), NOT in this YAML, to match
#     the convention used by WindowsAppSDK-Foundation-PR.yml.
#   * Configure UI -> Pull request validation:
#       - Override the YAML pull request trigger from here: ON
#       - Enable pull request validation:                   ON
#       - Branch filters:  Include refs/heads/main
#                          Include refs/heads/release/*
#       - Path filters:    Include dev/Templates/**
#####################################################################################################################################

trigger: none

# TODO: keep TemplatesBaseVersion in sync with the <Version> in
# dev/Templates/Dotnet/WinAppSdk.CSharp.DotnetNewTemplates.csproj.
# If/when that csproj is refactored to use <VersionPrefix>+<VersionSuffix>,
# this pipeline can switch to only overriding the suffix instead.
variables:
  TemplatesBaseVersion: '0.0.5-alpha'
  PrPackageVersion: '$(TemplatesBaseVersion).pr.$(System.PullRequest.PullRequestNumber).$(Build.BuildId)'

name: TemplatesPR-$(Date:yyyyMMdd)$(Rev:.r)

resources:
  repositories:
    - repository: templates
      type: git
      name: OneBranch.Pipelines/GovernedTemplates
      ref: refs/heads/main

extends:
  template: v2/Microsoft.NonOfficial.yml@templates
  parameters:
    featureFlags:
      EnableCDPxPAT: false
      WindowsHostVersion:
        Version: 2022
        Network: R1

    platform:
      name: 'windows_undocked'

    cloudvault:
      enabled: false

    # PR validation does not gate on heavy SDL tools. The main build
    # pipeline (WindowsAppSDK-DotnetNewTemplates.yml) remains responsible
    # for full SDL coverage on canonical builds.
    globalSdl:
      tsa:
        enabled: false
      isNativeCode: false
      psscriptanalyzer:
        enable: false
      binskim:
        enabled: false
      prefast:
        enabled: false
      apiscan:
        enabled: false

    stages:
      # Build + pack the dotnet-new templates NuGet using the same stage
      # template the main pipeline uses, but with signing/publishing off
      # and the package version stamped with the PR number + build id.
      - template: AzurePipelinesTemplates\WindowsAppSDK-DotnetNewTemplates-Stages.yml@self
        parameters:
          pool:
            type: windows
          publishToInternalFeed: false
          SignOutput: false
          PackageVersionOverride: '$(PrPackageVersion)'

      # Smoke-test: scaffold every template from the freshly built pack
      # and ensure each one still builds with dotnet build.
      - template: AzurePipelinesTemplates\WindowsAppSDK-DotnetNewTemplates-Test-Stage.yml@self
        parameters:
          pool:
            type: windows
          dependsOnStage: 'DotnetNewTemplates_Build'
