# Templates PR Validation Pipeline
#
# PR validation for changes under dev/Templates/**.
# Reuses the build/pack + smoke-test stages from the main pipeline
# (WindowsAppSDK-DotnetNewTemplates.yml). Nothing is signed; nothing is
# published. PR builds get a 'pr.<PR#>.<BuildId>' version suffix so they
# can't collide with canonical packages.
#
# Triggers are configured in the Azure DevOps UI (Edit pipeline -> Triggers),
# NOT in this YAML -- matches the WindowsAppSDK-Foundation-PR.yml convention.
# In the UI, under Pull request validation:
#   - Override the YAML pull request trigger from here: ON
#   - Enable pull request validation:                   ON
#   - Branch filters:  Include refs/heads/main
#                      Include refs/heads/release/*
#   - Path filters:    Include dev/Templates/**

trigger: none

# Suffix appended to the csproj <Version> at pack time so PR builds don't
# collide with canonical packages. The base version stays in the csproj
# (see PackageVersionSuffix in WindowsAppSDK-DotnetNewTemplates-Stages.yml).
variables:
  PrPackageVersionSuffix: 'pr.$(System.PullRequest.PullRequestNumber).$(Build.BuildId)'

name: TemplatesPR-$(Date:yyyyMMdd)$(Rev:.r)

resources:
  repositories:
    - repository: templates
      type: git
      name: OneBranch.Pipelines/GovernedTemplates
      ref: refs/heads/main

extends:
  template: v2/Microsoft.NonOfficial.yml@templates
  parameters:
    featureFlags:
      EnableCDPxPAT: false
      WindowsHostVersion:
        Version: 2022
        Network: R1

    platform:
      name: 'windows_undocked'

    cloudvault:
      enabled: false

    # Skip heavy SDL tools for PR validation; the main pipeline
    # (WindowsAppSDK-DotnetNewTemplates.yml) covers them on canonical builds.
    globalSdl:
      tsa:
        enabled: false
      isNativeCode: false
      psscriptanalyzer:
        enable: false
      binskim:
        enabled: false
      prefast:
        enabled: false
      apiscan:
        enabled: false

    stages:
      # Build + pack the templates NuGet. Signing/publishing off; the
      # package version is stamped with the PR number + build id.
      - template: AzurePipelinesTemplates\WindowsAppSDK-DotnetNewTemplates-Stages.yml@self
        parameters:
          pool:
            type: windows
          publishToInternalFeed: false
          SignOutput: false
          PackageVersionSuffix: '$(PrPackageVersionSuffix)'

      # Smoke-test: scaffold every template from the pack and dotnet build each.
      - template: AzurePipelinesTemplates\WindowsAppSDK-DotnetNewTemplates-Test-Stage.yml@self
        parameters:
          pool:
            type: windows
          dependsOnStage: 'DotnetNewTemplates_Build'
