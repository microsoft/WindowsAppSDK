#####################################################################################################################################
#                                       Templates PR Validation Pipeline                                                            #
#####################################################################################################################################
#
# Lightweight PR validation that ensures the dotnet new template package
# (dev/Templates/Dotnet/WinAppSdk.CSharp.DotnetNewTemplates.csproj) still
# builds when files under dev/Templates/** change in a pull request.
#
# Trigger configuration:
#   * CI / PR triggers are configured in the Azure DevOps UI on this
#     pipeline (Edit pipeline -> Triggers), NOT in this YAML, to match
#     the convention used by WindowsAppSDK-Foundation-PR.yml.
#   * Configure UI -> Pull request validation:
#       - Override the YAML pull request trigger from here: ON
#       - Enable pull request validation:                   ON
#       - Branch filters:  Include refs/heads/main
#                          Include refs/heads/release/*
#       - Path filters:    Include dev/Templates/**
#
# OneBranch / 1ES compliance: extends the non-official 1ES template,
# matching the pattern used by other ProjectReunion PR pipelines.
#####################################################################################################################################

trigger: none

name: TemplatesPR-$(Date:yyyyMMdd)$(Rev:.r)

resources:
  repositories:
    - repository: templates
      type: git
      name: OneBranch.Pipelines/GovernedTemplates
      ref: refs/heads/main

extends:
  template: v2/Microsoft.NonOfficial.yml@templates
  parameters:
    featureFlags:
      EnableCDPxPAT: false
      WindowsHostVersion:
        Version: 2022
        Network: R1

    platform:
      name: 'windows_undocked'

    cloudvault:
      enabled: false

    globalSdl:
      tsa:
        enabled: false
      isNativeCode: false
      psscriptanalyzer:
        enable: false
      binskim:
        enabled: false
      prefast:
        enabled: false
      apiscan:
        enabled: false

    stages:
      - stage: BuildTemplates
        displayName: 'Build templates package'
        jobs:
          - job: DotnetBuild
            displayName: 'dotnet build (net8.0 templates package)'
            pool:
              type: windows
            variables:
              ob_outputDirectory: '$(Build.SourcesDirectory)/out'
            steps:
              - checkout: self
                fetchDepth: 1
                displayName: 'Checkout WindowsAppSDK (shallow)'

              - task: UseDotNet@2
                displayName: 'Install .NET 8 SDK'
                inputs:
                  packageType: sdk
                  version: 8.x

              - script: dotnet --info
                displayName: 'dotnet --info (diagnostic)'

              - script: dotnet build dev\Templates\Dotnet\WinAppSdk.CSharp.DotnetNewTemplates.csproj --configuration Release
                displayName: 'dotnet build WinAppSdk.CSharp.DotnetNewTemplates.csproj'
                workingDirectory: $(Build.SourcesDirectory)
