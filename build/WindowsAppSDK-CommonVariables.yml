# Foundation-specific variables (supplements Build/WindowsAppSDK/AzurePipelinesTemplates/WindowsAppSDK-CommonVariables.yml@WinAppSDK)
# Only variables that are unique to Foundation or override mono repo defaults belong here.
variables:
  channel: 'experimental'
  versionMinDate: $[format('{0:yyMMdd}', pipeline.startTime)]
  version: $[format('{0}.{1}.{2}-{3}.{4}', variables['MajorVersion'], variables['MinorVersion'], variables['PatchVersion'], variables['versionDate'], variables['versionCounter'])]

  REPOROOT: $(Build.SourcesDirectory)
  OUTPUTROOT: $(REPOROOT)\out

  # Foundation defers to the global default LKG compiler version (unlike Closed which pins a specific LKG).
  # Empty strings override the Closed-specific values from the mono repo CommonVariables.
  # https://dev.azure.com/microsoft/OS/_git/UndockedES?path=/Pipelines/Config/CompilerToolsSettings.json
  compilerOverridePackageName: ""
  compilerOverridePackageVersion: ""
  compilerOverrideNupkgVersion: ""

  ob_sdl_prefast_runDuring: 'Guardian'

  enableTestPass: true

  BinskimExclusionForFoundationRepo: +:f|**.exe;+:f|**.dll;-:f|**\packages\**\*.dll;-:f|**\packages\**\*.exe;-:f|**\WindowsAppSDK.Test.NetCore\net**;-:f|**\WinAppSDK\**\*.exe;-:f|**\WinAppSDK\**\*.dll
